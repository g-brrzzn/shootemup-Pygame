name: Build Game Executable

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        shell: cmd
        run: |
          python -m PyInstaller --noconfirm --clean ShootEmUp.spec

      - name: Copy assets into dist folder
        shell: pwsh
        run: |
          Copy-Item -Path assets -Destination dist\ShootEmUp\assets -Recurse -Force

      - name: Create release zip
        shell: pwsh
        run: |
          Compress-Archive -Path dist\ShootEmUp\* -DestinationPath dist\ShootEmUp-Windows.zip -Force

      - name: Update Latest Release
        uses: ncipollo/release-action@v1
        with:
          tag: "latest"
          name: "Latest Build (Auto)"
          body: "Automatically generated build from the latest commit. Download the ZIP and extract it before running the game."
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          artifacts: "dist/ShootEmUp-Windows.zip"
          token: ${{ secrets.GITHUB_TOKEN }}